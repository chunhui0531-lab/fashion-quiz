<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快時尚健檢</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  :root {
    --bg:#0a0a0f; --surface:#13131a; --card:#1c1c26;
    --accent:#e8ff4d; --accent2:#ff6b35; --accent3:#4dffb4;
    --text:#f0f0f0; --muted:#666680; --border:#2a2a3a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:24px;}
  body::before{content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(232,255,77,0.04) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,107,53,0.04) 0%,transparent 60%);
    pointer-events:none;}
  .progress-bar{position:fixed;top:0;left:0;height:4px;
    background:linear-gradient(90deg,var(--accent),var(--accent3));
    transition:width 0.6s cubic-bezier(0.4,0,0.2,1);z-index:100;
    box-shadow:0 0 12px var(--accent);}
  .top-info{position:fixed;top:16px;right:20px;z-index:99;}
  .respondents-badge{background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);
    display:flex;align-items:center;gap:6px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes popIn{from{opacity:0;transform:scale(0.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

  .intro-emoji{font-size:60px;display:block;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
  .intro-title{font-size:clamp(26px,7vw,38px);font-weight:900;line-height:1.2;margin-bottom:14px;}
  .intro-title span{color:var(--accent);}
  .intro-sub{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:28px;}
  #screen-intro{text-align:center;max-width:460px;animation:slideUp 0.6s ease;}
  .identity-card{width:100%;max-width:460px;background:var(--card);
    border:1px solid var(--border);border-radius:24px;padding:32px 28px;margin-top:16px;}
  .identity-title{font-size:14px;font-weight:700;color:var(--muted);
    letter-spacing:2px;margin-bottom:20px;text-align:center;}
  .field-group{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
  .field-row{display:flex;gap:10px;}
  .field-wrap{display:flex;flex-direction:column;gap:6px;flex:1;}
  .field-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;}
  .field-input{background:var(--surface);border:2px solid var(--border);
    border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;
    font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color 0.2s;width:100%;}
  .field-input:focus{border-color:var(--accent);}
  .field-input::placeholder{color:var(--muted);}
  .btn-main{width:100%;padding:16px;background:var(--accent);color:#000;border:none;
    border-radius:14px;font-size:15px;font-weight:900;cursor:pointer;
    transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;letter-spacing:1px;}
  .btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,255,77,0.3);}
  .btn-main:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-green{background:var(--accent3);color:#000;}
  .btn-green:hover{box-shadow:0 8px 24px rgba(77,255,180,0.3);}

  .section-banner{width:100%;max-width:520px;text-align:center;margin-bottom:20px;}
  .section-tag{display:inline-block;background:rgba(232,255,77,0.12);
    border:1px solid rgba(232,255,77,0.3);color:var(--accent);font-size:11px;
    font-weight:700;letter-spacing:2px;padding:4px 14px;border-radius:20px;margin-bottom:8px;}
  .section-title-text{font-size:15px;color:var(--muted);}
  .card{width:100%;max-width:520px;background:var(--card);border:1px solid var(--border);
    border-radius:24px;padding:36px 32px;position:relative;}
  .card-anim{animation:slideUp 0.4s cubic-bezier(0.4,0,0.2,1);}
  .q-label{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .q-num{background:var(--accent);color:#000;font-weight:900;font-size:11px;
    padding:3px 10px;border-radius:20px;letter-spacing:1px;}
  .q-num.blue{background:var(--accent3);}
  .q-section-label{color:var(--muted);font-size:11px;letter-spacing:1px;}
  .question{font-size:clamp(18px,5vw,24px);font-weight:900;line-height:1.4;margin-bottom:28px;}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
  .option{background:var(--surface);border:2px solid var(--border);border-radius:14px;
    padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.2s;}
  .option:hover{border-color:var(--accent);transform:translateX(3px);}
  .option.selected{border-color:var(--accent);background:rgba(232,255,77,0.07);}
  .option-letter{width:30px;height:30px;border-radius:8px;background:var(--border);
    display:flex;align-items:center;justify-content:center;font-weight:700;
    font-size:12px;color:var(--muted);flex-shrink:0;transition:all 0.2s;}
  .option.selected .option-letter{background:var(--accent);color:#000;}
  .option-text{font-size:14px;font-weight:500;}
  .waiting-block{display:none;text-align:center;padding:16px 0 8px;}
  .waiting-block.show{display:block;}
  .waiting-icon{font-size:40px;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
  .waiting-title{font-size:17px;font-weight:900;color:var(--accent);margin-bottom:6px;}
  .waiting-sub{font-size:13px;color:var(--muted);line-height:1.6;}
  .dots{display:inline-flex;gap:5px;margin-top:14px;}
  .dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);
    animation:db 1.4s ease-in-out infinite;}
  .dots span:nth-child(2){animation-delay:0.2s;}
  .dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes db{0%,80%,100%{transform:translateY(0);opacity:0.3}40%{transform:translateY(-6px);opacity:1}}
  .step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px;}
  .step-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all 0.3s;}
  .step-dot.active{background:var(--accent);width:20px;border-radius:4px;}
  .step-dot.done{background:rgba(232,255,77,0.35);}
  .step-dot.active.blue{background:var(--accent3);}
  .submit-feedback{position:fixed;inset:0;display:flex;align-items:center;
    justify-content:center;background:rgba(0,0,0,0.75);z-index:200;
    opacity:0;pointer-events:none;transition:opacity 0.3s;}
  .submit-feedback.show{opacity:1;pointer-events:auto;}
  .sf-inner{background:var(--card);border:2px solid var(--accent);border-radius:20px;
    padding:28px 36px;text-align:center;transform:scale(0.85);
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
  .submit-feedback.show .sf-inner{transform:scale(1);}
  .sf-icon{font-size:36px;margin-bottom:10px;}
  .sf-text{font-weight:700;font-size:15px;color:var(--accent);}
  #screen-transition{display:none;text-align:center;max-width:460px;}
  .trans-emoji{font-size:52px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
  .trans-title{font-size:22px;font-weight:900;color:var(--accent);margin-bottom:10px;}
  .trans-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px;}

  /* ===== 等待報告頁 ===== */
  #screen-result{display:none;width:100%;max-width:460px;text-align:center;}
  .wr-emoji{font-size:56px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
  .wr-title{font-size:20px;font-weight:900;color:var(--accent);margin-bottom:10px;}
  .wr-sub{font-size:14px;color:var(--muted);line-height:1.8;}

  /* ===== 個人報告浮層 ===== */
  #report-overlay{
    position:fixed;inset:0;
    background:rgba(5,5,12,0.96);
    z-index:999;
    display:none;
    align-items:flex-start;
    justify-content:center;
    overflow-y:auto;
    padding:20px 16px 60px;
    -webkit-overflow-scrolling:touch;
  }
  #report-overlay.show{display:flex;animation:fadeIn 0.35s ease;}
  #report-card{
    width:100%;max-width:540px;
    background:var(--card);
    border-radius:28px;
    overflow:hidden;
    border:1px solid var(--border);
    animation:popIn 0.55s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn{
    from{opacity:0;transform:scale(0.85) translateY(24px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  .rpt-topbar{height:5px;width:100%;}
  .rpt-topbar.l0{background:linear-gradient(90deg,#4dffb4,#00e87a);}
  .rpt-topbar.l1{background:linear-gradient(90deg,#e8ff4d,#c8e000);}
  .rpt-topbar.l2{background:linear-gradient(90deg,#ff9f35,#ff5500);}
  .rpt-topbar.l3{background:linear-gradient(90deg,#ff4444,#cc0000);}
  .rpt-header{
    padding:18px 24px 14px;
    border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:flex-start;
  }
  .rpt-header-title{font-size:13px;font-weight:900;letter-spacing:1.5px;color:var(--muted);margin-bottom:4px;}
  .rpt-header-sub{font-size:12px;color:var(--muted);}
  .rpt-header-sub strong{color:var(--text);}
  .rpt-badge{
    text-align:center;padding:28px 24px 24px;
    border-bottom:1px solid var(--border);
    animation:slideUp 0.5s 0.1s both;
  }
  .rpt-emoji{font-size:64px;display:block;margin-bottom:10px;animation:float 3s ease-in-out infinite;}
  .rpt-grade-tag{display:inline-block;font-size:11px;font-weight:700;
    letter-spacing:3px;color:var(--muted);margin-bottom:8px;}
  .rpt-level-name{font-size:26px;font-weight:900;margin-bottom:16px;}
  .rpt-level-name.l0{color:#4dffb4;}
  .rpt-level-name.l1{color:#e8ff4d;}
  .rpt-level-name.l2{color:#ff9f35;}
  .rpt-level-name.l3{color:#ff5555;}
  .rpt-score-pill{
    display:inline-flex;align-items:baseline;gap:5px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:50px;padding:10px 22px;
  }
  .rpt-score-num{font-size:38px;font-weight:900;}
  .rpt-score-unit{font-size:12px;color:var(--muted);}
  .rpt-section{padding:20px 24px;border-bottom:1px solid var(--border);}
  .rpt-section-label{
    font-size:10px;font-weight:700;letter-spacing:2px;
    color:var(--muted);margin-bottom:16px;
    display:flex;align-items:center;gap:6px;
  }
  .dim-row{margin-bottom:14px;}
  .dim-row:last-child{margin-bottom:0;}
  .dim-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .dim-label{font-size:13px;font-weight:700;}
  .dim-val{font-size:15px;font-weight:900;}
  .dim-bar-bg{height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
  .dim-bar{height:100%;border-radius:5px;width:0;transition:width 1.4s cubic-bezier(0.4,0,0.2,1);}
  .dim-desc{font-size:11px;color:var(--muted);margin-top:4px;}
  .finding-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
  .finding-item:last-child{border-bottom:none;}
  .finding-icon{font-size:22px;width:30px;text-align:center;flex-shrink:0;margin-top:1px;}
  .finding-title{font-size:14px;font-weight:700;margin-bottom:4px;}
  .finding-detail{font-size:12px;color:var(--muted);line-height:1.65;}
  .rpt-env-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .env-cell{background:var(--surface);border-radius:14px;padding:16px 12px;text-align:center;}
  .env-icon{font-size:26px;margin-bottom:6px;}
  .env-val{font-size:19px;font-weight:900;margin-bottom:4px;}
  .env-label{font-size:11px;color:var(--muted);line-height:1.5;}
  .env-label strong{color:var(--text);}
  .rpt-action{padding:20px 24px;border-bottom:1px solid var(--border);}
  .rpt-action-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:10px;}
  .rpt-action-quote{
    background:var(--surface);border-left:3px solid var(--accent);
    border-radius:0 12px 12px 0;padding:14px 16px;
    font-size:14px;font-weight:700;color:var(--text);line-height:1.6;
  }
  .rpt-close-btn{
    display:block;width:100%;padding:18px;
    background:var(--accent);color:#000;border:none;
    font-size:15px;font-weight:900;cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;letter-spacing:1px;
    transition:background 0.2s;
  }
  .rpt-close-btn:hover{background:#f2ff60;}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width:0%"></div>
<div class="top-info">
  <div class="respondents-badge">
    <span class="dot"></span>
    <span id="respondentCount">0</span> 人填答中
  </div>
</div>
<div class="submit-feedback" id="submitFeedback">
  <div class="sf-inner">
    <div class="sf-icon">✅</div>
    <div class="sf-text">已記錄！等待老師開放下一題</div>
  </div>
</div>

<!-- 開場 -->
<div id="screen-intro">
  <span class="intro-emoji">👕</span>
  <h1 class="intro-title">你的衣櫃，<br><span>比你想的更貴</span></h1>
  <p class="intro-sub">先填寫你的資料，再開始 11 題快時尚健檢</p>
  <div class="identity-card">
    <div class="identity-title">填寫身份資料</div>
    <div class="field-group">
      <div class="field-wrap">
        <div class="field-label">班級</div>
        <input class="field-input" id="inputClass" type="text" placeholder="例：803" maxlength="10">
      </div>
      <div class="field-row">
        <div class="field-wrap">
          <div class="field-label">座號</div>
          <input class="field-input" id="inputSeat" type="text" placeholder="例：12" maxlength="4">
        </div>
        <div class="field-wrap" style="flex:2">
          <div class="field-label">姓名</div>
          <input class="field-input" id="inputName" type="text" placeholder="你的姓名" maxlength="10">
        </div>
      </div>
    </div>
    <button class="btn-main" id="btnStart" onclick="startQuiz()" disabled>開始健檢 →</button>
  </div>
</div>

<!-- 題目區 -->
<div id="screen-quiz" style="display:none;width:100%;max-width:520px;">
  <div class="section-banner">
    <div class="section-tag" id="sectionTag">第一關</div>
    <div class="section-title-text" id="sectionTitleText">衣櫃健檢</div>
  </div>
  <div class="step-dots" id="stepDots"></div>
  <div class="card card-anim" id="questionCard">
    <div class="q-label">
      <span class="q-num" id="qNum">Q1</span>
      <span class="q-section-label" id="qSectionLabel">衣櫃健檢</span>
    </div>
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="waiting-block" id="waitingBlock">
      <div class="waiting-icon">⏳</div>
      <div class="waiting-title">已收到你的答案！</div>
      <div class="waiting-sub">等老師開放下一題<br>一起看看全班的結果</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
    <button class="btn-main" id="btnSubmit" onclick="submitAnswer()" disabled>確認送出 →</button>
  </div>
</div>

<!-- 過渡 -->
<div id="screen-transition">
  <div class="trans-emoji">🎯</div>
  <div class="trans-title">衣櫃健檢完成！</div>
  <div class="trans-sub">接下來看看你的<strong style="color:var(--text)">消費習慣</strong><br>一起找出快時尚的影響</div>
  <button class="btn-main btn-green" onclick="startSection2()">繼續第二關 →</button>
</div>

<!-- 等待老師公布 -->
<div id="screen-result">
  <div class="wr-emoji">📋</div>
  <div class="wr-title">測驗完成！</div>
  <div class="wr-sub">
    你的答案已記錄完畢<br>
    等老師公布，個人報告即將出現
    <div class="dots" style="display:inline-flex;margin-top:12px;"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- 個人報告浮層 -->
<div id="report-overlay">
  <div id="report-card">
    <div class="rpt-topbar" id="rptTopbar"></div>
    <div class="rpt-header">
      <div>
        <div class="rpt-header-title">👕 &nbsp;快時尚健康檢測報告</div>
        <div class="rpt-header-sub" id="rptMeta">—</div>
      </div>
    </div>
    <div class="rpt-badge">
      <span class="rpt-emoji" id="rptEmoji">🌀</span>
      <div class="rpt-grade-tag" id="rptGrade">B 級</div>
      <div class="rpt-level-name" id="rptLevelName">快時尚入門用戶</div>
      <div class="rpt-score-pill">
        <span class="rpt-score-num" id="rptScoreNum">0</span>
        <span class="rpt-score-unit">快時尚指數</span>
      </div>
    </div>
    <div class="rpt-section">
      <div class="rpt-section-label"><span>📊</span> 三維度分析</div>
      <div id="rptDims"></div>
    </div>
    <div class="rpt-section">
      <div class="rpt-section-label"><span>🔍</span> 你的三大發現</div>
      <div id="rptFindings"></div>
    </div>
    <div class="rpt-section">
      <div class="rpt-section-label"><span>🌍</span> 你的衣物代價</div>
      <div class="rpt-env-grid" id="rptEnv"></div>
    </div>
    <div class="rpt-action">
      <div class="rpt-action-label">💡 &nbsp;給你的一個行動</div>
      <div class="rpt-action-quote" id="rptAction">—</div>
    </div>
    <button class="rpt-close-btn" onclick="closeReport()">我知道了 ✓</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzjrobTSm4fptBQl4Ie4HtfDPu3KLugyjn5qGfWJ2HrjEf_rY1_Vh4cbcM44ljrJIlr/exec';
const urlParams=new URLSearchParams(window.location.search);
const SESSION_ID=urlParams.get('session')||'default';
let studentClass='',studentSeat='',studentName='';

['inputClass','inputSeat','inputName'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    const c=document.getElementById('inputClass').value.trim();
    const s=document.getElementById('inputSeat').value.trim();
    const n=document.getElementById('inputName').value.trim();
    document.getElementById('btnStart').disabled=!(c&&s&&n);
  });
});

const allQuestions=[
  {id:'q1',section:'衣櫃健檢',sectionIndex:1,text:'你衣櫃裡大概有幾件衣服？',options:['20件以下','21–40件','41–60件','60件以上']},
  {id:'q2',section:'衣櫃健檢',sectionIndex:1,text:'這些衣服裡，幾乎不穿的佔幾成？',options:['不到1成','約2–3成','約4–5成','超過一半']},
  {id:'q3',section:'衣櫃健檢',sectionIndex:1,text:'上一件買的衣服，你穿了幾次？',options:['還沒穿','1–3次','4–10次','超過10次']},
  {id:'q4',section:'衣櫃健檢',sectionIndex:1,text:'你的衣服平均穿多久才丟？',options:['不到半年','半年到1年','1–3年','3年以上']},
  {id:'q5',section:'衣櫃健檢',sectionIndex:1,text:'最近一年你大概丟掉幾件衣服？',options:['0件','1–5件','6–10件','超過10件']},
  {id:'q6',section:'消費行為',sectionIndex:2,text:'買衣服最主要的考量是什麼？',options:['價格便宜','好看／流行','品質耐穿','品牌理念']},
  {id:'q7',section:'消費行為',sectionIndex:2,text:'買衣服前，你會想到「這件衣服是誰做的」嗎？',options:['從來不會','偶爾會','常常會','每次都會']},
  {id:'q8',section:'消費行為',sectionIndex:2,text:'如果一件衣服標示有機棉／公平貿易，你願意多付多少錢？',options:['完全不願意','多付50元以內','多付50–200元','品質好就願意']},
  {id:'q9',section:'消費行為',sectionIndex:2,text:'你平均一個月大概花多少錢買衣服？',options:['幾乎不買','500元以下','500–1500元','1500元以上']},
  {id:'q10',section:'消費行為',sectionIndex:2,text:'買衣服時，你會看標籤上的產地或材質嗎？',options:['從來不看','偶爾看','常常看','每次都看']},
  {id:'q11',section:'消費行為',sectionIndex:2,text:'你最近買的衣服，主要是因為什麼？',options:['真的需要','便宜忍不住','好看想要','跟上流行']}
];

const scoreMap={q1:[15,30,50,70],q2:[0.1,0.25,0.45,0.6],q3:[0.5,2,7,15],q4:[2.0,1.5,1.0,0.5],q5:[0,3,8,15]};
const SECTION1_END=5;
let currentQ=0,selectedOption=null,answered=false;
let pollInterval=null,respondentPollInterval=null,reportPollInterval=null;
const letters=['A','B','C','D'];
const studentId='S_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
const userAnswers={};

function startQuiz(){
  studentClass=document.getElementById('inputClass').value.trim();
  studentSeat=document.getElementById('inputSeat').value.trim();
  studentName=document.getElementById('inputName').value.trim();
  document.getElementById('screen-intro').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  renderStepDots();renderQuestion();
  startRespondentPoll();syncCurrentQuestion();
}

async function syncCurrentQuestion(){
  try{
    const res=await fetch(`${APPS_SCRIPT_URL}?type=status&session=${SESSION_ID}`);
    const data=await res.json();
    if(data.currentQuestion>=99){showResult();setTimeout(showReportOverlay,500);return;}
    if(data.currentQuestion>currentQ){currentQ=data.currentQuestion;renderQuestion();}
  }catch(e){}
}

function startSection2(){
  document.getElementById('screen-transition').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  renderStepDots();renderQuestion();
}

function renderStepDots(){
  const q=allQuestions[Math.min(currentQ,allQuestions.length-1)];
  const isS1=q.sectionIndex===1;
  const sectionQs=allQuestions.filter(x=>x.sectionIndex===q.sectionIndex);
  const localIdx=isS1?currentQ:currentQ-SECTION1_END;
  document.getElementById('stepDots').innerHTML=sectionQs.map((_,i)=>{
    let c='step-dot';
    if(i===localIdx)c+=isS1?' active':' active blue';
    else if(i<localIdx)c+=' done';
    return `<div class="${c}"></div>`;
  }).join('');
}

function renderQuestion(){
  if(currentQ>=allQuestions.length){showResult();return;}
  const q=allQuestions[currentQ];
  selectedOption=null;answered=false;
  const isS1=q.sectionIndex===1;
  const tag=document.getElementById('sectionTag');
  tag.textContent=isS1?'第一關':'第二關';
  tag.style.background=isS1?'rgba(232,255,77,0.12)':'rgba(77,255,180,0.12)';
  tag.style.borderColor=isS1?'rgba(232,255,77,0.3)':'rgba(77,255,180,0.3)';
  tag.style.color=isS1?'var(--accent)':'var(--accent3)';
  document.getElementById('sectionTitleText').textContent=q.section;
  document.getElementById('qNum').textContent=`Q${currentQ+1}`;
  document.getElementById('qNum').className='q-num'+(isS1?'':' blue');
  document.getElementById('qSectionLabel').textContent=q.section;
  document.getElementById('questionText').textContent=q.text;
  document.getElementById('progressBar').style.width=(currentQ/allQuestions.length*100)+'%';
  document.getElementById('optionsContainer').innerHTML=q.options.map((opt,i)=>`
    <div class="option" id="opt${i}" onclick="selectOption(${i})">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    </div>`).join('');
  document.getElementById('waitingBlock').classList.remove('show');
  document.getElementById('btnSubmit').style.display='block';
  document.getElementById('btnSubmit').disabled=true;
  document.getElementById('btnSubmit').textContent='確認送出 →';
  document.querySelectorAll('.option').forEach(el=>el.style.pointerEvents='auto');
  const card=document.getElementById('questionCard');
  card.style.animation='none';card.offsetHeight;
  card.style.animation='slideUp 0.4s cubic-bezier(0.4,0,0.2,1)';
  renderStepDots();
}

function selectOption(index){
  if(answered)return;
  selectedOption=index;
  document.querySelectorAll('.option').forEach((el,i)=>el.classList.toggle('selected',i===index));
  document.getElementById('btnSubmit').disabled=false;
}

async function submitAnswer(){
  if(selectedOption===null||answered)return;
  answered=true;
  const q=allQuestions[currentQ];
  userAnswers[q.id]=selectedOption;
  document.getElementById('submitFeedback').classList.add('show');
  setTimeout(()=>document.getElementById('submitFeedback').classList.remove('show'),1400);
  try{
    await fetch(APPS_SCRIPT_URL,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        type:'answer',studentId,session:SESSION_ID,
        studentClass,studentSeat,studentName,
        questionId:q.id,questionIndex:currentQ,
        answer:q.options[selectedOption],answerIndex:selectedOption,
        timestamp:new Date().toISOString()
      })
    });
  }catch(e){}
  setTimeout(()=>{
    document.getElementById('waitingBlock').classList.add('show');
    document.getElementById('btnSubmit').style.display='none';
    document.querySelectorAll('.option').forEach(el=>el.style.pointerEvents='none');
    startWaitingPoll();
  },1500);
}

function startWaitingPoll(){
  if(pollInterval)clearInterval(pollInterval);
  pollInterval=setInterval(checkNextQuestion,2000);
}

async function checkNextQuestion(){
  try{
    const res=await fetch(`${APPS_SCRIPT_URL}?type=status&session=${SESSION_ID}&t=${Date.now()}`);
    const data=await res.json();
    const serverQ=data.currentQuestion;
    if(serverQ>currentQ){
      clearInterval(pollInterval);
      if(serverQ>=99){currentQ=serverQ;showResult();setTimeout(showReportOverlay,500);return;}
      if(serverQ>=allQuestions.length){currentQ=serverQ;showResult();return;}
      if(currentQ===SECTION1_END-1&&serverQ===SECTION1_END){currentQ=serverQ;showTransition();return;}
      currentQ=serverQ;renderQuestion();
    }
  }catch(e){}
}

function showTransition(){
  document.getElementById('screen-quiz').style.display='none';
  const t=document.getElementById('screen-transition');
  t.style.display='block';t.style.animation='none';
  t.offsetHeight;t.style.animation='slideUp 0.5s ease';
}

function showResult(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-transition').style.display='none';
  document.getElementById('progressBar').style.width='100%';
  if(respondentPollInterval)clearInterval(respondentPollInterval);
  if(pollInterval)clearInterval(pollInterval);
  const s=document.getElementById('screen-result');
  s.style.display='block';s.style.animation='none';
  s.offsetHeight;s.style.animation='slideUp 0.6s ease';
  startReportPoll();
}

function startReportPoll(){
  if(reportPollInterval)clearInterval(reportPollInterval);
  reportPollInterval=setInterval(async()=>{
    try{
      const res=await fetch(`${APPS_SCRIPT_URL}?type=status&session=${SESSION_ID}&t=${Date.now()}`);
      const data=await res.json();
      if(data.currentQuestion>=99){
        clearInterval(reportPollInterval);
        showReportOverlay();
      }
    }catch(e){}
  },2000);
}

// ===== 計算 =====
function calcIndex(){
  const q1i=userAnswers['q1']??1,q2i=userAnswers['q2']??1;
  const q3i=userAnswers['q3']??2,q4i=userAnswers['q4']??2,q5i=userAnswers['q5']??0;
  const clothes=scoreMap.q1[q1i];
  const raw=(clothes*scoreMap.q2[q2i]/scoreMap.q3[q3i])*scoreMap.q4[q4i]+scoreMap.q5[q5i];
  return{finalScore:Math.round(raw),clothes,q1i,q2i,q3i,q4i,q5i};
}

function calcDimensions(){
  const q1i=userAnswers['q1']??1,q2i=userAnswers['q2']??1;
  const q3i=userAnswers['q3']??2,q4i=userAnswers['q4']??2;
  const q5i=userAnswers['q5']??0,q6i=userAnswers['q6']??0;
  const q7i=userAnswers['q7']??0,q8i=userAnswers['q8']??0;
  const q9i=userAnswers['q9']??0,q10i=userAnswers['q10']??0,q11i=userAnswers['q11']??0;
  const efficiency=Math.round(([100,75,40,15][q1i]+[100,70,35,10][q2i]+[5,30,70,100][q3i]+[10,40,75,100][q4i])/4);
  const selfControl=Math.round(([100,65,30,5][q5i]+[100,75,40,10][q9i]+[100,15,35,20][q11i])/3);
  const sustainability=Math.round(([25,15,65,100][q6i]+[5,35,75,100][q7i]+[5,25,65,100][q8i]+[5,35,75,100][q10i])/4);
  return{efficiency,selfControl,sustainability};
}

function getFindings(){
  const q1i=userAnswers['q1']??1,q2i=userAnswers['q2']??1,q11i=userAnswers['q11']??0;
  const q7i=userAnswers['q7']??0,q10i=userAnswers['q10']??0;
  const clothes=[15,30,50,70][q1i];
  const idlePct=[10,25,45,60][q2i];
  const idleCount=Math.round(clothes*idlePct/100);
  const f1=q2i>=2
    ?{icon:'🧺',title:`衣櫃約 ${idlePct}% 幾乎不穿`,detail:`估算有 ${idleCount} 件衣服正在閒置，每件都消耗了水和碳才製造出來`}
    :{icon:'✅',title:'衣物閒置比例偏低',detail:'你的衣服大多都有在穿，使用效率比多數人高'};
  const awarAvg=(q7i+q10i)/2;
  const f2=awarAvg<1
    ?{icon:'👁️',title:'對供應鏈幾乎無感知',detail:'幾乎不會想到衣服的產地和生產者——這是最普遍的消費盲點'}
    :awarAvg<2
    ?{icon:'👁️',title:'永續意識正在萌芽',detail:'偶爾注意標籤和生產者，距離有意識的消費只差一步'}
    :{icon:'👁️',title:'具備供應鏈意識',detail:'比多數人更在意衣服的來源，這很珍貴'};
  const f3=[
    {icon:'💚',title:'購衣動機以需求為主',detail:'你通常等到真正需要才買，是理性消費的好習慣'},
    {icon:'⚡',title:'容易被低價觸發消費',detail:'「便宜忍不住」正是快時尚品牌最想要你有的心理'},
    {icon:'👀',title:'外觀是主要購衣驅動力',detail:'視覺衝動驅動的消費，是衣櫃爆滿最常見的原因'},
    {icon:'📱',title:'跟上流行是購衣主因',detail:'快時尚品牌靠 2–3 週換季，讓你永遠覺得衣服「過時了」'}
  ][q11i];
  return[f1,f2,f3];
}

function getAction(level){
  return['繼續保持！試著記錄每件衣服的穿著次數，讓好習慣更有意識。',
    '下次想買衣服前，先拍下衣櫃問自己：「我真的需要嗎？」',
    '挑戰自己：這個月只買一件品質好的衣服，暫停快時尚。',
    '從今天起，每次購衣前等待 48 小時再決定——衝動會消退的。'][level];
}

// ===== 顯示報告 =====
function showReportOverlay(){
  const d=calcIndex();
  const dims=calcDimensions();
  const findings=getFindings();
  const score=d.finalScore;
  let level,emoji,grade,levelName;
  if(score<=3){level=0;emoji='🌱';grade='S 級';levelName='慢時尚實踐者';}
  else if(score<=8){level=1;emoji='🌀';grade='B 級';levelName='快時尚入門用戶';}
  else if(score<=15){level=2;emoji='⚠️';grade='C 級';levelName='中度快時尚依賴';}
  else{level=3;emoji='🔥';grade='D 級';levelName='快時尚重度用戶';}
  const colors=['#4dffb4','#e8ff4d','#ff9f35','#ff5555'];
  const now=new Date();
  const dateStr=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;

  document.getElementById('rptTopbar').className=`rpt-topbar l${level}`;
  document.getElementById('rptMeta').innerHTML=`<strong>${studentClass}班 ${studentSeat}號 ${studentName}</strong>　${dateStr}`;
  document.getElementById('rptEmoji').textContent=emoji;
  document.getElementById('rptGrade').textContent=grade;
  document.getElementById('rptLevelName').textContent=levelName;
  document.getElementById('rptLevelName').className=`rpt-level-name l${level}`;
  document.getElementById('rptScoreNum').textContent=score;
  document.getElementById('rptScoreNum').style.color=colors[level];

  const dimData=[
    {label:'衣物使用效率',val:dims.efficiency,color:'#4dffb4',desc:'買少・閒置低・穿多・穿久'},
    {label:'消費自制力',val:dims.selfControl,color:'#e8ff4d',desc:'丟少・消費理性・為需求而買'},
    {label:'永續意識',val:dims.sustainability,color:'#a78bfa',desc:'關注來源・願意為永續多付出'}
  ];
  document.getElementById('rptDims').innerHTML=dimData.map(d=>`
    <div class="dim-row">
      <div class="dim-top">
        <span class="dim-label">${d.label}</span>
        <span class="dim-val" style="color:${d.color}">${d.val}</span>
      </div>
      <div class="dim-bar-bg">
        <div class="dim-bar" data-val="${d.val}" style="background:${d.color}"></div>
      </div>
      <div class="dim-desc">${d.desc}</div>
    </div>`).join('');

  document.getElementById('rptFindings').innerHTML=findings.map((f,i)=>`
    <div class="finding-item" style="animation-delay:${i*0.08}s">
      <span class="finding-icon">${f.icon}</span>
      <div>
        <div class="finding-title">${f.title}</div>
        <div class="finding-detail">${f.detail}</div>
      </div>
    </div>`).join('');

  const water=d.clothes*2700;
  const tubs=Math.round(water/90);
  const trees=Math.round(d.clothes*5/21);
  document.getElementById('rptEnv').innerHTML=`
    <div class="env-cell">
      <div class="env-icon">💧</div>
      <div class="env-val" style="color:#4d9fff">${water.toLocaleString()}<span style="font-size:11px"> 公升</span></div>
      <div class="env-label">製造耗水<br>約 <strong>${tubs} 個浴缸</strong></div>
    </div>
    <div class="env-cell">
      <div class="env-icon">🌲</div>
      <div class="env-val" style="color:#4dffb4">${trees}<span style="font-size:11px"> 棵</span></div>
      <div class="env-label">需要這些樹<br><strong>一整年</strong>才能吸收碳排</div>
    </div>`;

  document.getElementById('rptAction').textContent=getAction(level);

  const overlay=document.getElementById('report-overlay');
  overlay.classList.add('show');
  overlay.scrollTop=0;
  setTimeout(()=>{
    document.querySelectorAll('.dim-bar').forEach((bar,i)=>{
      setTimeout(()=>{bar.style.width=bar.getAttribute('data-val')+'%';},i*220);
    });
  },400);
}

function closeReport(){
  document.getElementById('report-overlay').classList.remove('show');
}

function startRespondentPoll(){
  respondentPollInterval=setInterval(async()=>{
    try{
      const res=await fetch(`${APPS_SCRIPT_URL}?type=respondents&session=${SESSION_ID}`);
      const data=await res.json();
      document.getElementById('respondentCount').textContent=data.count||0;
    }catch(e){}
  },5000);
}
</script>
</body>
