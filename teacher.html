<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老師控制台｜快時尚健檢</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

  :root {
    --bg: #07070d;
    --surface: #0f0f18;
    --card: #141420;
    --accent: #e8ff4d;
    --accent2: #ff6b35;
    --accent3: #4dffb4;
    --text: #f0f0f0;
    --muted: #555570;
    --border: #1e1e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 0;
  }

  /* 背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 10%, rgba(232,255,77,0.03) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 90% 90%, rgba(77,255,180,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  /* 頂部標題列 */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    position: relative;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .header-badges {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }

  .badge.count-badge {
    font-size: 14px;
    font-weight: 700;
    border-color: rgba(232,255,77,0.3);
  }

  .badge.count-badge .num {
    color: var(--accent);
    font-size: 18px;
    font-weight: 900;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* 按鈕 */
  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-refresh {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-refresh:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-next {
    background: var(--accent);
    color: #000;
    font-size: 14px;
    padding: 12px 24px;
    letter-spacing: 0.5px;
  }

  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(232,255,77,0.35);
  }

  .btn-next:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-reset {
    background: transparent;
    border: 1px solid #ff4444;
    color: #ff4444;
    font-size: 12px;
    padding: 8px 14px;
  }

  .btn-reset:hover { background: rgba(255,68,68,0.1); }

  /* 主要內容 */
  main {
    padding: 32px;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 24px;
    align-items: start;
    position: relative;
    z-index: 1;
  }

  /* 圖表區 */
  .chart-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    position: relative;
    overflow: hidden;
  }

  .chart-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
  }

  .chart-header {
    margin-bottom: 32px;
  }

  .chart-q-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .chart-q-num {
    background: var(--accent);
    color: #000;
    font-weight: 900;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  .chart-q-section {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .chart-title {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 900;
    line-height: 1.3;
    color: var(--text);
  }

  .chart-container {
    position: relative;
    height: 320px;
  }

  /* 統計數字 */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .stat-item {
    flex: 1;
    text-align: center;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* 右側面板 */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* 題目列表 */
  .questions-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .q-list-item {
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .q-list-item:hover { background: var(--surface); }

  .q-list-item.active {
    background: rgba(232,255,77,0.08);
    border-color: rgba(232,255,77,0.3);
  }

  .q-list-item.done {
    opacity: 0.5;
  }

  .q-list-num {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
  }

  .q-list-item.active .q-list-num {
    background: var(--accent);
    color: #000;
  }

  .q-list-item.done .q-list-num {
    background: rgba(232,255,77,0.2);
    color: var(--accent);
  }

  .q-list-text {
    font-size: 12px;
    line-height: 1.4;
    color: var(--text);
  }

  /* 刷新狀態 */
  .refresh-status {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .refresh-info {
    font-size: 12px;
    color: var(--muted);
  }

  .refresh-info span {
    color: var(--accent3);
    font-weight: 700;
  }

  .refresh-spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent3);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }

  .refresh-spinner.active { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 底部狀態列 */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    position: relative;
    z-index: 10;
  }

  .footer-status {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 數字跳動動畫 */
  @keyframes numPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); color: var(--accent); }
    100% { transform: scale(1); }
  }

  .num-updated {
    animation: numPop 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* 長條圖數值標籤 */
  .chart-update-flash {
    position: absolute;
    top: 12px; right: 16px;
    background: rgba(77,255,180,0.15);
    border: 1px solid rgba(77,255,180,0.4);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--accent3);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .chart-update-flash.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">👕 快時尚健檢</div>
    <div class="header-badges">
      <div class="badge">
        <span class="live-dot"></span>
        即時統計
      </div>
      <div class="badge count-badge">
        <span class="num" id="totalCount">0</span> 人填答
      </div>
      <div class="badge" id="sessionBadge" style="border-color:rgba(77,255,180,0.4); color:var(--accent3); display:none;">
        場次：<strong id="sessionDisplay">—</strong>
      </div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-refresh" onclick="manualRefresh()">
      <span>↻</span> 手動刷新
    </button>
    <button class="btn" onclick="showNewSession()" style="background:var(--card); border:1px solid rgba(77,255,180,0.4); color:var(--accent3);">
      ＋ 新場次
    </button>
    <button class="btn btn-next" id="btnNextQ" onclick="openNextQuestion()">
      開放下一題 →
    </button>
  </div>
</header>

<!-- 新場次 Modal -->
<div id="sessionModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:999; align-items:center; justify-content:center;">
  <div style="background:var(--card); border:1px solid var(--border); border-radius:20px; padding:36px 40px; width:100%; max-width:420px; text-align:center;">
    <div style="font-size:36px; margin-bottom:16px;">🆕</div>
    <div style="font-size:20px; font-weight:900; margin-bottom:8px;">建立新場次</div>
    <div style="font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.6;">
      建立後會產生新的學生端 QR Code<br>舊場次資料自動保留，不會被刪除
    </div>
    <div style="background:var(--surface); border-radius:12px; padding:16px; margin-bottom:24px;">
      <div style="font-size:12px; color:var(--muted); margin-bottom:6px;">新場次代碼</div>
      <div style="font-size:28px; font-weight:900; color:var(--accent); letter-spacing:3px;" id="newSessionCode">—</div>
    </div>
    <div style="display:flex; gap:10px;">
      <button onclick="hideSessionModal()" style="flex:1; padding:14px; background:var(--border); border:none; border-radius:12px; color:var(--muted); font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;">取消</button>
      <button onclick="confirmNewSession()" style="flex:2; padding:14px; background:var(--accent); border:none; border-radius:12px; color:#000; font-size:14px; font-weight:900; cursor:pointer; font-family:inherit;">確認開始新場次 →</button>
    </div>
  </div>
</div>

<main>
  <!-- 圖表區 -->
  <div class="chart-panel">
    <div class="chart-update-flash" id="updateFlash">已更新</div>
    <div class="chart-header">
      <div class="chart-q-label">
        <span class="chart-q-num" id="chartQNum">Q1</span>
        <span class="chart-q-section">衣櫃健檢</span>
      </div>
      <div class="chart-title" id="chartTitle">你衣櫃裡大概有幾件衣服？</div>
    </div>
    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>
    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-value" id="statAnswered">0</span>
        <div class="stat-label">已作答</div>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statMost">—</span>
        <div class="stat-label">最多人選</div>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statPct">0%</span>
        <div class="stat-label">最高比例</div>
      </div>
    </div>
  </div>

  <!-- 右側 -->
  <div class="side-panel">
    <div class="questions-panel">
      <div class="panel-title">題目進度</div>
      <div id="qList"></div>
    </div>

    <div class="refresh-status">
      <div class="refresh-info">
        自動刷新：每 <span>5</span> 秒
        <br>上次更新：<span id="lastUpdate">—</span>
      </div>
      <div class="refresh-spinner" id="spinner"></div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-status">
    <span>老師控制台</span>
    <span>｜</span>
    <span>目前題目：<strong id="footerQ">Q1</strong></span>
    <span>｜</span>
    <span>場次：<strong id="footerSession" style="color:var(--accent3)">尚未建立</strong></span>
  </div>
  <div id="footerQR" style="font-size:12px; color:var(--muted);">請先建立場次以產生學生端連結</div>
</footer>

<script>
// ==========================================
// 設定區：請填入你的 Apps Script 網址
// ==========================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzjrobTSm4fptBQl4Ie4HtfDPu3KLugyjn5qGfWJ2HrjEf_rY1_Vh4cbcM44ljrJIlr/exec';

// ==========================================
// 場次管理
let currentSession = localStorage.getItem('currentSession') || null;
let pendingSession = null;

function generateSessionCode() {
  const now = new Date();
  const date = now.toISOString().slice(0,10).replace(/-/g,'');
  const rand = Math.floor(Math.random()*900+100);
  return `${date}-${rand}`;
}

function showNewSession() {
  pendingSession = generateSessionCode();
  document.getElementById('newSessionCode').textContent = pendingSession;
  document.getElementById('sessionModal').style.display = 'flex';
}

function hideSessionModal() {
  document.getElementById('sessionModal').style.display = 'none';
  pendingSession = null;
}

async function confirmNewSession() {
  currentSession = pendingSession;
  localStorage.setItem('currentSession', currentSession);
  hideSessionModal();

  // 通知 Apps Script 新場次
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'newSession',
        session: currentSession
      })
    });
  } catch(e) {}

  currentQ = 0;
  updateSessionUI();
  viewQuestion(0);
}

function updateSessionUI() {
  if (!currentSession) return;

  // header badge
  document.getElementById('sessionDisplay').textContent = currentSession;
  document.getElementById('sessionBadge').style.display = 'flex';

  // footer
  document.getElementById('footerSession').textContent = currentSession;

  // 產生學生端連結
  const baseUrl = window.location.href.replace('teacher.html', 'student.html');
  const studentUrl = `${baseUrl}?session=${currentSession}`;
  document.getElementById('footerQR').innerHTML =
    `學生端連結：<a href="${studentUrl}" target="_blank" style="color:var(--accent3);">${studentUrl}</a>`;
}

// ==========================================
const questions = [
  // 第一關：衣櫃健檢
  { id:'q1', section:'衣櫃健檢', text:'你衣櫃裡大概有幾件衣服？', options:['20件以下','21–40件','41–60件','60件以上'] },
  { id:'q2', section:'衣櫃健檢', text:'幾乎不穿的佔幾成？', options:['不到1成','約2–3成','約4–5成','超過一半'] },
  { id:'q3', section:'衣櫃健檢', text:'上一件買的衣服，穿了幾次？', options:['還沒穿','1–3次','4–10次','超過10次'] },
  { id:'q4', section:'衣櫃健檢', text:'衣服平均穿多久才丟？', options:['不到半年','半年到1年','1–3年','3年以上'] },
  { id:'q5', section:'衣櫃健檢', text:'最近一年丟掉幾件衣服？', options:['0件','1–5件','6–10件','超過10件'] },
  // 第二關：消費行為
  { id:'q6', section:'消費行為', text:'買衣服最主要的考量是什麼？', options:['價格便宜','好看／流行','品質耐穿','品牌理念'] },
  { id:'q7', section:'消費行為', text:'買衣服前，會想到「誰做的」嗎？', options:['從來不會','偶爾會','常常會','每次都會'] },
  { id:'q8', section:'消費行為', text:'願意為有機棉多付多少？', options:['完全不願意','多付50元以內','多付50–200元','品質好就願意'] },
  { id:'q9', section:'消費行為', text:'平均一個月花多少錢買衣服？', options:['幾乎不買','500元以下','500–1500元','1500元以上'] },
  { id:'q10', section:'消費行為', text:'買衣服時會看標籤產地或材質嗎？', options:['從來不看','偶爾看','常常看','每次都看'] },
  { id:'q11', section:'消費行為', text:'最近買的衣服，主要是因為什麼？', options:['真的需要','便宜忍不住','好看想要','跟上流行'] }
];

let currentQ = 0;
let chart = null;
let autoRefreshInterval = null;
const COLORS = ['#e8ff4d', '#4dffb4', '#ff6b35', '#a78bfa'];
const COLORS_DARK = ['rgba(232,255,77,0.15)', 'rgba(77,255,180,0.15)', 'rgba(255,107,53,0.15)', 'rgba(167,139,250,0.15)'];

// 初始化
window.onload = () => {
  renderQList();
  initChart();
  if (currentSession) updateSessionUI();
  fetchData();
  startAutoRefresh();
};

function renderQList() {
  const container = document.getElementById('qList');
  let html = '';
  let lastSection = '';
  questions.forEach((q, i) => {
    if (q.section !== lastSection) {
      lastSection = q.section;
      const isS1 = q.section === '衣櫃健檢';
      html += `<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:${isS1 ? 'var(--accent)' : 'var(--accent3)'};padding:8px 4px 4px;margin-top:${i>0?'10px':'0'}">${q.section.toUpperCase()}</div>`;
    }
    html += `
      <div class="q-list-item ${i === currentQ ? 'active' : i < currentQ ? 'done' : ''}"
           id="qItem${i}" onclick="viewQuestion(${i})">
        <div class="q-list-num">${i < currentQ ? '✓' : i+1}</div>
        <div class="q-list-text">${q.text}</div>
      </div>`;
  });
  container.innerHTML = html;
}

function initChart() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  const q = questions[currentQ];

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: q.options,
      datasets: [{
        data: [0, 0, 0, 0],
        backgroundColor: COLORS_DARK,
        borderColor: COLORS,
        borderWidth: 2,
        borderRadius: 10,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw} 人（${totalForQ > 0 ? Math.round(ctx.raw/totalForQ*100) : 0}%）`
          },
          backgroundColor: '#1c1c26',
          titleColor: '#e8ff4d',
          bodyColor: '#f0f0f0',
          borderColor: '#2a2a3a',
          borderWidth: 1,
          padding: 12,
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            color: '#888899',
            font: { family: 'Noto Sans TC', size: 13, weight: '700' }
          },
          border: { display: false }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#555570',
            font: { size: 11 },
            stepSize: 1,
            precision: 0
          },
          border: { display: false },
          beginAtZero: true
        }
      }
    }
  });
}

let totalForQ = 0;

async function fetchData() {
  const spinner = document.getElementById('spinner');
  spinner.classList.add('active');

  try {
    const sessionParam = currentSession ? `&session=${currentSession}` : '';
    const res = await fetch(`${APPS_SCRIPT_URL}?type=stats&q=${currentQ}${sessionParam}`);
    const data = await res.json();

    updateChart(data.counts || [0,0,0,0]);
    updateStats(data.counts || [0,0,0,0], data.total || 0);
    updateRespondentCount(data.total || 0);

    // 刷新時間
    const now = new Date();
    document.getElementById('lastUpdate').textContent = 
      `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

    // 閃爍提示
    const flash = document.getElementById('updateFlash');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 1000);

  } catch(e) {
    console.log('資料取得失敗，請確認 Apps Script 網址');
  }

  spinner.classList.remove('active');
}

function updateChart(counts) {
  totalForQ = counts.reduce((a,b) => a+b, 0);
  const maxVal = Math.max(...counts);

  chart.data.datasets[0].data = counts;
  chart.data.datasets[0].backgroundColor = counts.map((v, i) =>
    v === maxVal && maxVal > 0 ? COLORS[i] + '30' : COLORS_DARK[i]
  );
  chart.data.datasets[0].borderColor = counts.map((v, i) =>
    v === maxVal && maxVal > 0 ? COLORS[i] : COLORS[i] + '60'
  );
  chart.update();
}

function updateStats(counts, total) {
  totalForQ = total;
  const maxVal = Math.max(...counts);
  const maxIdx = counts.indexOf(maxVal);
  const q = questions[currentQ];

  document.getElementById('statAnswered').textContent = total;
  document.getElementById('statMost').textContent = total > 0 ? q.options[maxIdx] : '—';
  document.getElementById('statPct').textContent = total > 0 ? Math.round(maxVal/total*100) + '%' : '0%';
}

function updateRespondentCount(count) {
  const el = document.getElementById('totalCount');
  const prev = parseInt(el.textContent) || 0;
  el.textContent = count;
  if (count !== prev) {
    el.classList.remove('num-updated');
    el.offsetHeight;
    el.classList.add('num-updated');
  }
}

function startAutoRefresh() {
  if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  autoRefreshInterval = setInterval(fetchData, 5000);
}

function manualRefresh() {
  fetchData();
}

function viewQuestion(idx) {
  currentQ = idx;
  const q = questions[currentQ];
  document.getElementById('chartQNum').textContent = `Q${currentQ+1}`;
  document.getElementById('chartTitle').textContent = q.text;
  document.getElementById('footerQ').textContent = `Q${currentQ+1}`;
  chart.data.labels = q.options;
  fetchData();
  renderQList();

  const btn = document.getElementById('btnNextQ');
  btn.disabled = currentQ >= questions.length - 1;
  btn.textContent = currentQ >= questions.length - 1 ? '全部完成 ✓' : '開放下一題 →';
}

async function openNextQuestion() {
  if (currentQ >= questions.length - 1) return;
  const nextQ = currentQ + 1;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'setQuestion',
        questionIndex: nextQ,
        session: currentSession
      })
    });
  } catch(e) {}
  viewQuestion(nextQ);
}

// 場次機制取代reset，不再需要手動重置
</script>
</body>
</html>
